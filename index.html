<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>brat lyrics</title>
  </head>
  <body>
    <div id="app">
      <!-- Display area (what gets exported) -->
      <main id="stage-wrap">
        <div id="stage-area">
          <div id="stage">
            <div id="lyrics"></div>
          </div>
        </div>
        <!-- Filmstrip: one thumbnail = one phrase (last thumb = add) -->
        <div id="filmstrip">
          <div id="film-list"></div>
        </div>
      </main>

      <!-- Control bar -->
      <section id="controls">
        <div class="input-row">
          <input
            id="text-input"
            type="text"
            autocomplete="off"
            spellcheck="false"
            placeholder="there is something about those lyrics"
          />
        </div>

        <div class="tabs">
          <button class="tab-btn active" data-tab="style">Style</button>
          <button class="tab-btn" data-tab="export">Sequence</button>
          <!-- Video Sync hidden for now -->
          <button class="tab-btn" data-tab="sync" hidden>Video Sync</button>
        </div>

        <!-- Style Panel (Phase 3) -->
        <div class="panel active" data-panel="style">
          <div class="grid">
            <label>Font
              <select id="c-font">
                <option value="arial_narrowregular, 'Arial Narrow', sans-serif">Arial Narrow (brat)</option>
                <option value="Arial, Helvetica, sans-serif">Arial</option>
                <option value="'Helvetica Neue', Helvetica, sans-serif">Helvetica</option>
                <option value="'Times New Roman', Times, serif">Times</option>
                <option value="Georgia, serif">Georgia</option>
                <option value="'Courier New', monospace">Courier</option>
                <option value="Impact, sans-serif">Impact</option>
              </select>
            </label>

            <label>Blur
              <input id="c-blur" type="range" min="0" max="6" step="0.1" value="2" />
              <span class="val" id="v-blur"></span>
            </label>

            <label>Weight
              <select id="c-weight">
                <option value="300">Light</option>
                <option value="400">Normal</option>
                <option value="500">Medium (brat)</option>
                <option value="700">Bold</option>
                <option value="900">Extra Bold</option>
              </select>
            </label>

            <label>Letter Spacing
              <input id="c-tracking" type="range" min="-0.08" max="0.3" step="0.005" value="0" />
              <span class="val" id="v-tracking"></span>
            </label>

            <label>Line Height (0 = brat 1.0)
              <input id="c-leading" type="range" min="0" max="1.6" step="0.01" value="0" />
              <span class="val" id="v-leading"></span>
            </label>

            <label>Block Width
              <input id="c-width" type="range" min="40" max="100" step="1" value="100" />
              <span class="val" id="v-width"></span>
            </label>

            <label class="checkbox">
              <input id="c-autofit" type="checkbox" checked />
              Auto-fit size
            </label>

            <label>Max Size (auto) / Fixed
              <input id="c-size" type="range" min="20" max="320" step="1" value="170" />
              <span class="val" id="v-size"></span>
            </label>

            <label class="checkbox">
              <input id="c-lowercase" type="checkbox" checked />
              Lowercase
            </label>

            <label class="checkbox">
              <input id="c-justify-last" type="checkbox" checked />
              Justify last line
            </label>

            <label>Text
              <input id="c-color" type="color" value="#ffffff" />
            </label>

            <label>Background
              <input id="c-bg" type="color" value="#000000" />
            </label>
          </div>

          <div class="section-title">Creative</div>
          <div class="grid">
            <label>Background Type
              <select id="c-bgtype">
                <option value="solid">Solid</option>
                <option value="gradient">Gradient</option>
                <option value="image">Image</option>
              </select>
            </label>
            <label>Background 2 (gradient)
              <input id="c-bg2" type="color" value="#8ace00" />
            </label>
            <label>Gradient Angle
              <input id="c-bgangle" type="range" min="0" max="360" step="5" value="90" />
              <span class="val" id="v-bgangle"></span>
            </label>
            <label class="file-row">Background Image
              <input id="c-bgimage" type="file" accept="image/*" />
            </label>

            <label>Glow
              <input id="c-glow" type="range" min="0" max="40" step="1" value="0" />
              <span class="val" id="v-glow"></span>
            </label>
            <label>Glow Color
              <input id="c-glowcolor" type="color" value="#8ace00" />
            </label>

            <label>Outline
              <input id="c-outline" type="range" min="0" max="12" step="0.5" value="0" />
              <span class="val" id="v-outline"></span>
            </label>
            <label>Outline Color
              <input id="c-outlinecolor" type="color" value="#000000" />
            </label>

            <label>Rotation
              <input id="c-rotate" type="range" min="-15" max="15" step="0.5" value="0" />
              <span class="val" id="v-rotate"></span>
            </label>
          </div>
          <button id="reset-style" class="ghost">Reset style</button>
        </div>

        <!-- Export Panel (Phase 2) -->
        <div class="panel" data-panel="export">
          <div class="grid">
            <label>Mode
              <select id="e-mode">
                <option value="cumulative">Cumulative (+1 word / image)</option>
                <option value="word">Word by word (1 word only)</option>
                <option value="line">Line by line</option>
              </select>
            </label>

            <label>Unit
              <select id="e-unit">
                <option value="word">By word</option>
                <option value="char">By letter</option>
              </select>
            </label>

            <label class="checkbox">
              <input id="e-transparent" type="checkbox" />
              Transparent background (PNG)
            </label>
          </div>

          <p class="hint">Exports the whole timeline: each phrase is broken down with the settings above.</p>
          <p class="hint" id="export-hint"></p>
          <div class="export-actions">
            <button id="btn-export">Export timeline (.zip)</button>
            <button id="btn-preview-seq" class="ghost">Preview steps</button>
          </div>
          <div id="export-status"></div>
          <div id="seq-preview"></div>
        </div>

        <!-- Sync + video export Panel -->
        <div class="panel" data-panel="sync">
          <label class="file-row">1 · Load audio (mp3, wav…)
            <input id="sync-audio-file" type="file" accept="audio/*" />
          </label>
          <audio id="sync-audio" controls></audio>

          <p class="hint">
            2 · Play the audio and press <b>Space</b> (or "Tap") when each
            <span id="sync-unit-label">word</span> should appear.
          </p>
          <div class="grid">
            <label>Splitting
              <select id="sync-granularity">
                <option value="word">Word by word</option>
                <option value="line">Line by line</option>
              </select>
            </label>
            <label class="checkbox">
              <input id="sync-countin" type="checkbox" />
              Count-in 1 beat before
            </label>
          </div>

          <div class="tap-row">
            <button id="btn-tap">Tap ⎵</button>
            <button id="btn-tap-undo" class="ghost">↩︎ Undo</button>
            <button id="btn-tap-reset" class="ghost">Reset</button>
          </div>
          <div id="tap-progress" class="hint"></div>
          <div id="tap-tokens"></div>

          <p class="hint">3 · Export synced video</p>
          <div class="grid">
            <label>Appearance
              <select id="v-anim">
                <option value="blur">Blur + fade (brat)</option>
                <option value="fade">Fade</option>
                <option value="pop">Pop (zoom)</option>
                <option value="none">Cut</option>
              </select>
            </label>
            <label>Resolution
              <select id="v-res">
                <option value="1080">1080 × 680</option>
                <option value="720">720 × 454</option>
                <option value="1440">1440 × 907</option>
              </select>
            </label>
            <label class="checkbox">
              <input id="v-audio" type="checkbox" checked />
              Include audio in video
            </label>
          </div>
          <button id="btn-export-video">Export video (.webm)</button>
          <div id="video-status"></div>
        </div>

        <p class="credit">
          Based on code from
          <a href="https://www.bratgenerator.com" target="_blank" rel="noopener noreferrer">bratgenerator.com</a>
          · <a href="https://github.com/GARNAUD-CORP/alt-lyrics-gen" target="_blank" rel="noopener noreferrer">GitHub</a>
        </p>
      </section>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
